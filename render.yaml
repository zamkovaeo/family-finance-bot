services:
  - type: web
    name: family-finance-bot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: Family Finance Bot
      - key: DATABASE_URL
        fromDatabase:
          name: family-finance-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: STT_MODEL
        value: whisper-1
      - key: DEFAULT_CURRENCY
        value: RUB
      - key: PUBLIC_APP_URL
        value: https://family-finance-bot-7rip.onrender.com/miniapp

databases:
  - name: family-finance-db
    plan: free
